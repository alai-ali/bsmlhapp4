<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BSMLH v7.5 | Restoration</title>
    <style>
        :root { --gold: #f6851b; --bg: #000; --wc-bg: #f0f7f2; --neon: #00f2ff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; height: 100vh; overflow: hidden; position: fixed; width: 100%; }

        /* ЗАСТАВКА (ОРИГИНАЛ) */
        #splash { position: fixed; inset: 0; z-index: 9999; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; animation: fadeOut 0.5s forwards 2.5s; pointer-events: none; }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }
        .s-title { font-size: 50px; font-weight: 900; letter-spacing: 12px; color: #fff; }
        .s-sub { font-size: 10px; color: #fff; margin-top: 15px; text-align: center; max-width: 80%; text-transform: uppercase; letter-spacing: 1px; }

        /* ЭКРАНЫ РЕГИСТРАЦИИ */
        .screen { position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; padding: 25px; background: #000; z-index: 1000; }
        .active { display: flex; }
        .globe-wrap { position: absolute; top: 20px; right: 20px; z-index: 2000; cursor: pointer; }
        .lang-menu { position: absolute; top: 45px; right: 0; background: #1a1a1a; border: 1px solid #333; border-radius: 12px; display: none; flex-direction: column; width: 120px; }
        .lang-menu div { padding: 12px; text-align: center; color: #fff; border-bottom: 1px solid #333; }

        /* КИБЕР-ГРАФИКА */
        .cyber-logo { width: 100px; height: 100px; border: 2px solid var(--neon); border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 30px; position: relative; }
        .cyber-logo::after { content: '🛡️'; font-size: 45px; }
        .scan-line { position: absolute; width: 100%; height: 2px; background: var(--neon); animation: scan 2s infinite linear; top:0; }
        @keyframes scan { to { top: 100%; } }

        /* ПРИЛОЖЕНИЕ */
        #app { display: none; height: 100vh; flex-direction: column; background: var(--wc-bg); z-index: 5000; position: absolute; inset: 0; color: #000; }
        header { height: 60px; background: #1a1a1a; color: #fff; display: flex; justify-content: center; align-items: center; font-weight: 600; }
        .content { flex: 1; overflow-y: auto; }

        /* ЧАТ (ВОССТАНОВЛЕН) */
        .chat-item { display: flex; padding: 12px 15px; border-bottom: 1px solid #e2ebe4; align-items: center; background: var(--wc-bg); }
        .chat-av { width: 48px; height: 48px; background: #fff; border-radius: 8px; margin-right: 12px; font-size: 24px; display: flex; align-items: center; justify-content: center; }

        /* HUB & ПРОФИЛЬ */
        .hub-wrap { padding: 15px; }
        .hub-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .hub-tile { background: #fff; padding: 25px 10px; border-radius: 12px; text-align: center; font-weight: bold; font-size: 12px; border: 1px solid #eee; }
        .patent-tile { grid-column: span 2; background: #1a1a1a; color: var(--gold); border: 1px solid var(--gold); margin-bottom: 10px; padding: 20px; border-radius: 15px; text-align: center; font-weight: bold; }
        
        .wc-header { background: #fff; padding: 30px 20px; display: flex; align-items: center; margin-bottom: 10px; position: relative; }
        .qr-icon { position: absolute; right: 25px; font-size: 24px; cursor: pointer; }
        #user-photo { width: 64px; height: 64px; border-radius: 8px; margin-right: 15px; background: #eee; object-fit: cover; }
        .wc-group { margin-bottom: 10px; background: #fff; }
        .wc-item { padding: 15px 20px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }

        /* МОДАЛКИ ПРОГРАММ */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 8000; flex-direction: column; align-items: center; justify-content: center; }
        .prog-box { background: #fff; padding: 20px; border-radius: 20px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; width: 90%; max-width: 320px; }
        .prog-btn { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: #000; text-decoration: none; }
        .prog-btn img { width: 45px; height: 45px; margin-bottom: 5px; }

        footer { height: 85px; padding-bottom: 25px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #ddd; background: #f7f7f7; }
        .n-btn { color: #999; font-size: 10px; font-weight: bold; }
        .n-btn.on { color: #07c160; }
        .btn-m { background: var(--gold); color: #000; border: none; padding: 18px; border-radius: 12px; font-weight: bold; width: 100%; max-width: 300px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="s-title">BSMLH</div>
        <div class="s-sub">BIOMETRIC SECURITY MULTIFUNCTION LEDGER FOR HUMANITY</div>
    </div>

    <div id="scr-reg" class="screen active">
        <div class="globe-wrap" onclick="toggleLang()"><div style="font-size:30px;">🌐</div>
            <div id="l-menu" class="lang-menu">
                <div onclick="setLang('RU')">Русский</div>
                <div onclick="setLang('EN')">English</div>
            </div>
        </div>
        <h2 id="reg-t" style="margin-top: 80px; margin-bottom: 20px;">РЕГИСТРАЦИЯ</h2>
        <input type="text" id="in-f" placeholder="ИМЯ" style="background:#111; border:1px solid #333; padding:16px; color:#fff; border-radius:12px; width:300px; margin-bottom:15px;">
        <button class="btn-m" onclick="startCam()">ДАЛЕЕ</button>
    </div>

    <div id="scr-scan" class="screen">
        <video id="video-feed" autoplay playsinline style="width:260px; height:260px; border-radius:50%; object-fit:cover; border:3px solid var(--gold); transform: scaleX(-1);"></video>
        <button class="btn-m" style="margin-top:30px;" onclick="takePhoto()">СДЕЛАТЬ ФОТО</button>
    </div>

    <div id="scr-chip" class="screen">
        <div class="cyber-logo"><div class="scan-line"></div></div>
        <h3 id="chip-t" style="height:30px;"></h3>
        <button class="btn-m" onclick="activateChip()">АКТИВИРОВАТЬ</button>
        <div style="margin-top:15px; text-decoration:underline; font-size:13px;" onclick="toApp()">ВОЙТИ БЕЗ ЧИПА</div>
    </div>

    <div id="app">
        <header>BSMLH</header>
        <div class="content">
            <div id="view-chat"></div>
            <div id="view-maps" style="display:none; height:100%;"><iframe src="https://maps.google.com/maps?output=embed" style="width:100%; height:100%; border:0;"></iframe></div>
            
            <div id="view-hub" style="display:none;" class="hub-wrap">
                <div class="patent-tile" onclick="openPatent()">🛠 ПАТЕНТНАЯ МАСТЕРСКАЯ</div>
                <div class="hub-grid">
                    <div class="hub-tile" onclick="window.open('https://play.google.com')">📱 APPS</div>
                    <div class="hub-tile" onclick="openMod('modal-progs')">💻 PROGS</div>
                    <div class="hub-tile" onclick="openMod('modal-scan')">🔍 SCAN QR</div>
                    <div class="hub-tile" onclick="window.open('https://google.com')">🔎 SEARCH</div>
                </div>
            </div>

            <div id="view-prof" style="display:none;">
                <div class="wc-header">
                    <img id="user-photo" src="" alt="">
                    <div><h2 id="u-name-disp">User</h2><p style="color:#999; font-size:12px;">ID: bsmlh_7701</p></div>
                    <div class="qr-icon" onclick="openMod('modal-qr')">🔳</div>
                </div>
                <div class="wc-group">
                    <div class="wc-item"><span>💳 Services</span><span>></span></div>
                    <div class="wc-item"><span>⚙️ Settings</span><span>></span></div>
                </div>
            </div>
        </div>
        <footer>
            <div id="n-chat" class="n-btn on" onclick="tab('chat')">CHAT</div>
            <div id="n-maps" class="n-btn" onclick="tab('maps')">MAPS</div>
            <div id="n-hub" class="n-btn" onclick="tab('hub')">HUB</div>
            <div id="n-prof" class="n-btn" onclick="tab('prof')">PROFILE</div>
        </footer>
    </div>

    <div id="modal-progs" class="modal" onclick="this.style.display='none'">
        <div class="prog-box" onclick="event.stopPropagation()">
            <a href="https://wa.me/" class="prog-btn"><img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">WhatsApp</a>
            <a href="https://t.me/" class="prog-btn"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">Telegram</a>
            <a href="https://youtube.com" class="prog-btn"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">YouTube</a>
        </div>
    </div>
    <div id="modal-qr" class="modal" onclick="this.style.display='none'">
        <div style="background:#fff; padding:20px; border-radius:15px;"><img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=USER_BSMLH"></div>
    </div>
    <div id="modal-scan" class="modal" onclick="this.style.display='none'">
        <div style="width:250px; height:250px; border:2px solid var(--neon); position:relative;"><div class="scan-line"></div></div>
    </div>

    <canvas id="photo-canvas" style="display:none;"></canvas>

    <script>
        function toggleLang() { const m = document.getElementById('l-menu'); m.style.display = m.style.display==='flex'?'none':'flex'; }
        function setLang(l) { document.getElementById('reg-t').innerText = (l==='RU'?'РЕГИСТРАЦИЯ':'REGISTRATION'); toggleLang(); }

        async function startCam() {
            if(!document.getElementById('in-f').value) return;
            document.getElementById('scr-reg').classList.remove('active');
            document.getElementById('scr-scan').classList.add('active');
            const s = await navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}});
            document.getElementById('video-feed').srcObject = s;
        }

        function takePhoto() {
            const v = document.getElementById('video-feed'), c = document.getElementById('photo-canvas');
            c.width = v.videoWidth; c.height = v.videoHeight;
            c.getContext('2d').drawImage(v,0,0);
            document.getElementById('user-photo').src = c.toDataURL();
            v.srcObject.getTracks().forEach(t => t.stop());
            document.getElementById('scr-scan').classList.remove('active');
            document.getElementById('scr-chip').classList.add('active');
        }

        function activateChip() { document.getElementById('chip-t').innerText="ОЖИДАНИЕ ЧИПА..."; setTimeout(toApp, 2000); }

        function toApp() {
            document.getElementById('u-name-disp').innerText = document.getElementById('in-f').value;
            document.getElementById('scr-chip').classList.remove('active');
            document.getElementById('app').style.display = 'flex';
            loadChats();
        }

        function loadChats() {
            const l = document.getElementById('view-chat');
            const u = [{n:"Alex",a:"🤖"},{n:"Sarah",a:"🎨"},{n:"Ahmed",a:"🌙"},{n:"Li",a:"🐲"},{n:"Maria",a:"🧬"}];
            l.innerHTML = u.map(x => `
                <div class="chat-item"><div class="chat-av">${x.a}</div><div><h4>${x.n}</h4><p style="color:#88a08d; font-size:12px;">Secure connection...</p></div></div>
            `).join('');
        }

        function openMod(id) { document.getElementById(id).style.display = 'flex'; }
        function openPatent() { const i = prompt("Идея:"); if(i) alert("Сохранено!"); }

        function tab(t) {
            ['chat','maps','hub','prof'].forEach(id => {
                document.getElementById('view-'+id).style.display = (id===t?'block':'none');
                document.getElementById('n-'+id).classList.toggle('on', id===t);
            });
        }
    </script>
</body>
</html>
