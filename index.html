<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BSMLH v8.1 | Fixed & Fast</title>
    <style>
        :root { --gold: #f6851b; --bg: #000; --wc-bg: #ededed; --neon: #00f2ff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; height: 100vh; overflow: hidden; position: fixed; width: 100%; }

        /* ЭКРАНЫ */
        .screen { position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; padding: 25px; background: #000; z-index: 1000; }
        .active-screen { display: flex; } /* Только для начального экрана */

        /* ГЛОБУС */
        .globe-wrap { position: absolute; top: 20px; right: 20px; z-index: 2000; cursor: pointer; padding: 10px; font-size: 30px; }
        .lang-menu { position: absolute; top: 55px; right: 0; background: #1a1a1a; border: 1px solid #333; border-radius: 12px; display: none; flex-direction: column; width: 130px; }
        .lang-menu div { padding: 12px; text-align: center; color: #fff; border-bottom: 1px solid #333; font-size: 14px; }

        /* ПРИЛОЖЕНИЕ */
        #app { display: none; height: 100vh; flex-direction: column; background: var(--wc-bg); z-index: 5000; position: absolute; inset: 0; color: #000; }
        header { height: 60px; background: #1a1a1a; color: #fff; display: flex; justify-content: center; align-items: center; font-weight: 600; }
        .content { flex: 1; overflow-y: auto; }

        /* ПРОФИЛЬ */
        .wc-header { background: #fff; padding: 40px 20px; display: flex; align-items: center; position: relative; margin-bottom: 8px; }
        #user-photo { width: 64px; height: 64px; border-radius: 10px; margin-right: 20px; background: #f3f3f3; object-fit: cover; }
        .wc-group { background: #fff; margin-bottom: 8px; border-top: 0.5px solid #ddd; border-bottom: 0.5px solid #ddd; }
        .wc-item { display: flex; align-items: center; padding: 14px 20px; position: relative; }
        .wc-text { flex: 1; font-size: 16px; color: #000; }
        .wc-icon { width: 25px; margin-right: 15px; font-size: 20px; text-align: center; }

        footer { height: 85px; padding-bottom: 25px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #ddd; background: #f7f7f7; }
        .n-btn { color: #999; font-size: 10px; font-weight: bold; text-align: center; }
        .n-btn.on { color: #07c160; }
        
        .btn-m { background: var(--gold); color: #000; border: none; padding: 18px; border-radius: 12px; font-weight: bold; width: 300px; cursor: pointer; margin-top: 10px; }
        input { background:#111; border:1px solid #333; padding:16px; color:#fff; border-radius:12px; width:300px; margin-bottom:10px; outline:none; }
    </style>
</head>
<body>

    <div id="scr-reg" class="screen" style="display: flex;">
        <div class="globe-wrap" onclick="toggleLang()">🌐
            <div id="l-menu" class="lang-menu">
                <div onclick="setLang('RU')">Русский</div>
                <div onclick="setLang('EN')">English</div>
                <div onclick="setLang('CN')">中文</div>
                <div onclick="setLang('AR')">العربية</div>
            </div>
        </div>
        <h2 id="reg-t" style="margin-top: 80px; margin-bottom: 20px;">РЕГИСТРАЦИЯ</h2>
        <input type="text" id="in-f" placeholder="ИМЯ">
        <input type="text" id="in-l" placeholder="ФАМИЛИЯ">
        <button id="btn-next" class="btn-m" onclick="startCam()">ДАЛЕЕ</button>
    </div>

    <div id="scr-scan" class="screen">
        <video id="video-feed" autoplay playsinline style="width:260px; height:260px; border-radius:50%; object-fit:cover; border:3px solid var(--gold); transform: scaleX(-1);"></video>
        <button id="btn-photo" class="btn-m" style="margin-top:30px;" onclick="takePhoto()">СДЕЛАТЬ ФОТО</button>
    </div>

    <div id="scr-chip" class="screen">
        <div style="width:100px; height:100px; border:2px solid var(--neon); border-radius:20px; display:flex; align-items:center; justify-content:center; margin-bottom:30px; font-size:40px;">🛡️</div>
        <h3 id="chip-t"></h3>
        <button id="btn-act" class="btn-m" onclick="activateChip()">АКТИВИРОВАТЬ</button>
        <div id="btn-skip" style="margin-top:15px; text-decoration:underline; font-size:13px; cursor:pointer;" onclick="toApp()">ВОЙТИ БЕЗ ЧИПА</div>
    </div>

    <div id="app">
        <header>BSMLH</header>
        <div class="content">
            <div id="view-chat">
                <div class="wc-item" style="background:#fff;"><div class="wc-icon">🤖</div><div class="wc-text"><b>System</b><p style="color:#999;font-size:12px;">Secure Line Active</p></div></div>
            </div>
            <div id="view-maps" style="display:none; height:100%; background:#eee;"></div>
            <div id="view-hub" style="display:none; padding:20px;">
                <div style="background:#1a1a1a; color:var(--gold); padding:20px; border-radius:15px; text-align:center;">🛠 HUB ACTIVE</div>
            </div>
            <div id="view-prof" style="display:none;">
                <div class="wc-header">
                    <img id="user-photo" src="" alt="">
                    <div><h2 id="u-name-disp">User</h2><p style="color:#888; font-size:13px;">Hu ID: <span id="hu-id-val">...</span></p></div>
                </div>
                <div class="wc-group">
                    <div class="wc-item"><span class="wc-icon">💳</span><span class="wc-text" id="p-ser">Services</span></div>
                    <div class="wc-item"><span class="wc-icon">⚙️</span><span class="wc-text" id="p-set">Settings</span></div>
                </div>
            </div>
        </div>
        <footer>
            <div id="n-chat" class="n-btn on" onclick="tab('chat')">CHAT</div>
            <div id="n-maps" class="n-btn" onclick="tab('maps')">MAPS</div>
            <div id="n-hub" class="n-btn" onclick="tab('hub')">HUB</div>
            <div id="n-prof" class="n-btn" onclick="tab('prof')">PROFILE</div>
        </footer>
    </div>

    <canvas id="photo-canvas" style="display:none;"></canvas>

    <script>
        const translations = {
            RU: { t: "РЕГИСТРАЦИЯ", f: "ИМЯ", l: "ФАМИЛИЯ", n: "ДАЛЕЕ", p: "СДЕЛАТЬ ФОТО", a: "АКТИВИРОВАТЬ", s: "ВОЙТИ БЕЗ ЧИПА", ser: "Сервисы", set: "Настройки" },
            EN: { t: "REGISTRATION", f: "FIRST NAME", l: "LAST NAME", n: "NEXT", p: "TAKE PHOTO", a: "ACTIVATE", s: "SKIP CHIP", ser: "Services", set: "Settings" },
            CN: { t: "注册", f: "名字", l: "姓氏", n: "下一步", p: "拍照", a: "激活", s: "跳过", ser: "服务", set: "设置" },
            AR: { t: "تسجيل", f: "الاسم", l: "الكنية", n: "التالي", p: "تصوير", a: "تفعيل", s: "تخطى", ser: "خدمات", set: "إعدادات" }
        };

        function setLang(lang) {
            const d = translations[lang];
            document.getElementById('reg-t').innerText = d.t;
            document.getElementById('in-f').placeholder = d.f;
            document.getElementById('in-l').placeholder = d.l;
            document.getElementById('btn-next').innerText = d.n;
            document.getElementById('btn-photo').innerText = d.p;
            document.getElementById('btn-act').innerText = d.a;
            document.getElementById('btn-skip').innerText = d.s;
            document.getElementById('p-ser').innerText = d.ser;
            document.getElementById('p-set').innerText = d.set;
            toggleLang();
        }

        function toggleLang() {
            const m = document.getElementById('l-menu');
            m.style.display = (m.style.display === 'flex' ? 'none' : 'flex');
        }

        async function startCam() {
            if(!document.getElementById('in-f').value) return;
            document.getElementById('scr-reg').style.display = 'none';
            document.getElementById('scr-scan').style.display = 'flex';
            try {
                const s = await navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}});
                document.getElementById('video-feed').srcObject = s;
            } catch(e) { alert("Camera error"); }
        }

        function takePhoto() {
            const v = document.getElementById('video-feed'), c = document.getElementById('photo-canvas');
            c.width = v.videoWidth; c.height = v.videoHeight;
            c.getContext('2d').drawImage(v,0,0);
            document.getElementById('user-photo').src = c.toDataURL();
            if(v.srcObject) v.srcObject.getTracks().forEach(t => t.stop());
            document.getElementById('scr-scan').style.display = 'none';
            document.getElementById('scr-chip').style.display = 'flex';
        }

        function activateChip() {
            document.getElementById('chip-t').innerText = "WAITING...";
            setTimeout(toApp, 1500);
        }

        function toApp() {
            document.getElementById('u-name-disp').innerText = document.getElementById('in-f').value + " " + document.getElementById('in-l').value;
            document.getElementById('hu-id-val').innerText = "HU-" + Math.random().toString(36).substr(2, 12).toUpperCase();
            document.getElementById('scr-chip').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
        }

        function tab(t) {
            ['chat','maps','hub','prof'].forEach(id => {
                document.getElementById('view-'+id).style.display = (id===t ? 'block' : 'none');
                document.getElementById('n-'+id).classList.toggle('on', id===t);
            });
        }
    </script>
</body>
</html>
