<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BSMLH v7.9 | Stable Build</title>
    <style>
        :root { --gold: #f6851b; --bg: #000; --wc-bg: #ededed; --neon: #00f2ff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; height: 100vh; overflow: hidden; position: fixed; width: 100%; }

        /* ЗАСТАВКА */
        #splash { position: fixed; inset: 0; z-index: 9999; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; animation: fadeOut 0.5s forwards 2.5s; pointer-events: none; }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }
        .s-title { font-size: 50px; font-weight: 900; letter-spacing: 12px; color: #fff; }
        .s-sub { font-size: 10px; color: #fff; margin-top: 15px; text-align: center; max-width: 80%; text-transform: uppercase; letter-spacing: 1px; }

        /* ЭКРАНЫ */
        .screen { position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; padding: 25px; background: #000; z-index: 1000; }
        .active { display: flex; }
        .globe-wrap { position: absolute; top: 20px; right: 20px; z-index: 2000; cursor: pointer; }
        .lang-menu { position: absolute; top: 45px; right: 0; background: #1a1a1a; border: 1px solid #333; border-radius: 12px; display: none; flex-direction: column; width: 120px; }
        .lang-menu div { padding: 12px; text-align: center; color: #fff; border-bottom: 1px solid #333; font-size: 14px; }

        /* ПРИЛОЖЕНИЕ */
        #app { display: none; height: 100vh; flex-direction: column; background: var(--wc-bg); z-index: 5000; position: absolute; inset: 0; color: #000; }
        header { height: 60px; background: #1a1a1a; color: #fff; display: flex; justify-content: center; align-items: center; font-weight: 600; }
        .content { flex: 1; overflow-y: auto; }

        /* ПРОФИЛЬ (WECHAT STYLE) */
        .wc-header { background: #fff; padding: 40px 20px; display: flex; align-items: center; position: relative; margin-bottom: 8px; }
        #user-photo { width: 64px; height: 64px; border-radius: 10px; margin-right: 20px; background: #f3f3f3; object-fit: cover; }
        .wc-group { background: #fff; margin-bottom: 8px; border-top: 0.5px solid #ddd; border-bottom: 0.5px solid #ddd; }
        .wc-item { display: flex; align-items: center; padding: 14px 20px; position: relative; cursor: pointer; }
        .wc-item:not(:last-child)::after { content: ''; position: absolute; left: 55px; right: 0; bottom: 0; height: 0.5px; background: #eee; }
        .wc-text { flex: 1; font-size: 16px; color: #000; }
        .wc-arrow { color: #b2b2b2; font-size: 14px; }

        footer { height: 85px; padding-bottom: 25px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #ddd; background: #f7f7f7; }
        .n-btn { color: #999; font-size: 10px; font-weight: bold; }
        .n-btn.on { color: #07c160; }
        .btn-m { background: var(--gold); color: #000; border: none; padding: 18px; border-radius: 12px; font-weight: bold; width: 100%; max-width: 300px; cursor: pointer; margin-top: 10px; }
        input { background:#111; border:1px solid #333; padding:16px; color:#fff; border-radius:12px; width:300px; margin-bottom:10px; outline:none; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="s-title">BSMLH</div>
        <div class="s-sub">BIOMETRIC SECURITY MULTIFUNCTION LEDGER FOR HUMANITY</div>
    </div>

    <div id="scr-reg" class="screen active">
        <div class="globe-wrap" onclick="toggleLang()"><div style="font-size:30px;">🌐</div>
            <div id="l-menu" class="lang-menu">
                <div onclick="setLang('RU')">Русский</div>
                <div onclick="setLang('EN')">English</div>
                <div onclick="setLang('CN')">中文</div>
                <div onclick="setLang('AR')">العربية</div>
            </div>
        </div>
        <h2 id="reg-t" style="margin-top: 80px; margin-bottom: 20px;">РЕГИСТРАЦИЯ</h2>
        <input type="text" id="in-f" placeholder="ИМЯ">
        <input type="text" id="in-l" placeholder="ФАМИЛИЯ">
        <button id="btn-next" class="btn-m" onclick="startCam()">ДАЛЕЕ</button>
    </div>

    <div id="scr-scan" class="screen">
        <video id="video-feed" autoplay playsinline style="width:260px; height:260px; border-radius:50%; object-fit:cover; border:3px solid var(--gold); transform: scaleX(-1);"></video>
        <button id="btn-photo" class="btn-m" style="margin-top:30px;" onclick="takePhoto()">СДЕЛАТЬ ФОТО</button>
    </div>

    <div id="scr-chip" class="screen">
        <div style="width:100px; height:100px; border:2px solid var(--neon); border-radius:20px; display:flex; align-items:center; justify-content:center; margin-bottom:30px; position:relative;">🛡️</div>
        <h3 id="chip-t" style="height:30px;"></h3>
        <button id="btn-act" class="btn-m" onclick="activateChip()">АКТИВИРОВАТЬ</button>
        <div id="btn-skip" style="margin-top:15px; text-decoration:underline; font-size:13px;" onclick="toApp()">ВОЙТИ БЕЗ ЧИПА</div>
    </div>

    <div id="app">
        <header>BSMLH</header>
        <div class="content">
            <div id="view-chat"></div>
            <div id="view-prof" style="display:none;">
                <div class="wc-header">
                    <img id="user-photo" src="" alt="">
                    <div class="u-info">
                        <h2 id="u-name-disp">User</h2>
                        <p style="color:#888; font-size:13px;">Hu ID: <span id="hu-id-display">...</span></p>
                    </div>
                </div>
                <div class="wc-group">
                    <div class="wc-item"><span class="wc-text">Settings</span><span class="wc-arrow">></span></div>
                </div>
            </div>
        </div>
        <footer>
            <div id="n-chat" class="n-btn on" onclick="tab('chat')">CHAT</div>
            <div id="n-prof" class="n-btn" onclick="tab('prof')">PROFILE</div>
        </footer>
    </div>

    <canvas id="photo-canvas" style="display:none;"></canvas>

    <script>
        const translations = {
            RU: { t: "РЕГИСТРАЦИЯ", f: "ИМЯ", l: "ФАМИЛИЯ", n: "ДАЛЕЕ", p: "СДЕЛАТЬ ФОТО", a: "АКТИВИРОВАТЬ", s: "ВОЙТИ БЕЗ ЧИПА" },
            EN: { t: "REGISTRATION", f: "FIRST NAME", l: "LAST NAME", n: "NEXT", p: "TAKE PHOTO", a: "ACTIVATE", s: "SKIP CHIP" },
            CN: { t: "注册", f: "名字", l: "姓氏", n: "下一步", p: "拍照", a: "激活", s: "跳过芯片" },
            AR: { t: "تسجيل", f: "الاسم الأول", l: "الكنية", n: "التالي", p: "تصوير", a: "تفعيل", s: "تخطى" }
        };

        function setLang(lang) {
            const d = translations[lang];
            document.getElementById('reg-t').innerText = d.t;
            document.getElementById('in-f').placeholder = d.f;
            document.getElementById('in-l').placeholder = d.l;
            document.getElementById('btn-next').innerText = d.n;
            document.getElementById('btn-photo').innerText = d.p;
            document.getElementById('btn-act').innerText = d.a;
            document.getElementById('btn-skip').innerText = d.s;
            toggleLang();
        }

        function toggleLang() { const m = document.getElementById('l-menu'); m.style.display = m.style.display==='flex'?'none':'flex'; }

        async function startCam() {
            if(!document.getElementById('in-f').value) return;
            document.getElementById('scr-reg').classList.remove('active');
            document.getElementById('scr-scan').classList.add('active');
            const s = await navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}});
            document.getElementById('video-feed').srcObject = s;
        }

        function takePhoto() {
            const v = document.getElementById('video-feed'), c = document.getElementById('photo-canvas');
            c.width = v.videoWidth; c.height = v.videoHeight;
            c.getContext('2d').drawImage(v,0,0);
            document.getElementById('user-photo').src = c.toDataURL();
            v.srcObject.getTracks().forEach(t => t.stop());
            document.getElementById('scr-scan').classList.remove('active');
            document.getElementById('scr-chip').classList.add('active');
        }

        function activateChip() { document.getElementById('chip-t').innerText="WAITING..."; setTimeout(toApp, 1500); }

        function toApp() {
            const full = document.getElementById('in-f').value + " " + document.getElementById('in-l').value;
            document.getElementById('u-name-disp').innerText = full;
            document.getElementById('hu-id-display').innerText = "HU-" + Math.random().toString(36).substr(2, 12).toUpperCase();
            document.getElementById('scr-chip').classList.remove('active');
            document.getElementById('app').style.display = 'flex';
        }

        function tab(t) {
            document.getElementById('view-chat').style.display = (t==='chat'?'block':'none');
            document.getElementById('view-prof').style.display = (t==='prof'?'block':'none');
            document.getElementById('n-chat').classList.toggle('on', t==='chat');
            document.getElementById('n-prof').classList.toggle('on', t==='prof');
        }
    </script>
</body>
</html>
